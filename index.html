<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
<style>
    body{
        display: flex;
        align-items: center;
        justify-content: center;
        margin-top: 50px;
    }
    #main{
        display:inline-block;
        background-color: #606770;
        width: 310px;
        padding: 5px;
        height: 460px;
    }
    #out{
         background-color: #FFFFFF;
         height: 100px;
         width: 300px;
         padding: 5px;
         overflow:hidden;
         font-weight: bold;
        font-size: 20px;
    }
    #out:hover{
        overflow:scroll;
    }
.col{
    border: none;
    background-color: #606770;
    text-align: center;
    font-size: 29px;
    font-weight: bold;
    color: #FFFFFF;
}
.col:hover{
    cursor: pointer;
    background-color: darkorange;
}
</style>
<script>
    let text=0
function tkval(val){
    document.getElementById('out').append(val)
    text = document.getElementById('out').innerHTML
    document.getElementById('out').style.color='black'
}
function result(){
    if(text===0){
        document.getElementById('out').innerHTML=text
        document.getElementById('out').style.color='green'
    }
    else if(text.includes("^")){
        let pow_position=text.indexOf('^')
        let prepow=text.slice(0, pow_position)
        let postpow=text.slice(pow_position+1)
        let powval=Math.pow(prepow,postpow)
        document.getElementById('out').innerHTML = powval
        document.getElementById('out').style.color = 'green'
    }
    else {
        try {
            let res = eval(text)
            document.getElementById('out').innerHTML = res
            document.getElementById('out').style.color = 'green'
        }
        catch (e) {
            document.getElementById('out').innerHTML = 'Input Error'
            document.getElementById('out').style.color = 'red'
        }

    }
}
function sq(){

    let sr = Math.sqrt(text)
    document.getElementById('out').innerHTML = sr
    document.getElementById('out').style.color = 'green'

        }
function clr(){
    document.getElementById('out').innerHTML=""
    text=0
}
</script>
<div id="main">
    <div id="out"></div>
    <br>
    <div class="container text-center">
        <div class="row row-cols-3">
            <button class="col" onclick="tkval(1)">1</button>
            <button class="col" onclick="tkval(2)">2</button>
            <button class="col" onclick="tkval(3)">3</button>
            <button class="col" onclick="tkval(4)">4</button>
            <button class="col" onclick="tkval(5)">5</button>
            <button class="col" onclick="tkval(6)">6</button>
            <button class="col" onclick="tkval(7)">7</button>
            <button class="col" onclick="tkval(8)">8</button>
            <button class="col" onclick="tkval(9)">9</button>
            <button class="col" onclick="tkval(0)">0</button>
            <button class="col" onclick="tkval('.')">.</button>
            <button class="col" onclick="result()">=</button>
            <button class="col" onclick="tkval('+')">+</button>
            <button class="col" onclick="tkval('-')" >-</button>
            <button class="col" onclick="tkval('*')" >*</button>
            <button class="col" onclick="tkval('/')" >/</button>
            <button class="col" onclick="tkval('%')" >%</button>
            <button class="col" onclick="clr('c')">C</button>
            <button class="col" onclick="sq()">√</button>
            <button class="col" onclick="tkval('^')">^</button>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
